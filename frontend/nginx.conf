server {
    listen ${FRONTEND_BIND_ADDRESS}:${FRONTEND_PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header X-Frame-Options DENY always;

    location = /health/frontend {
        access_log off;
        default_type application/json;
        return 200 '{"internal_code":0,"message":"ok","data":{"status":"ok"},"timestamp":"1970-01-01T00:00:00Z","request_id":"frontend-health","error_reason":null}';
    }

    location /v1/ {
        proxy_pass http://${GATEWAY_HOST}:${GATEWAY_PORT};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Last-Event-ID $http_last_event_id;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location /health/ {
        proxy_pass http://${GATEWAY_HOST}:${GATEWAY_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \\.(?:js|css|woff2?|png|jpg|jpeg|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
